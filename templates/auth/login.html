{% extends "base.html" %}
{% block title %}Login — OptimizePro{% endblock %}
{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>OptimizePro</h1>
        <p class="subtitle">Sign in to your inventory dashboard</p>
        <form method="POST">
            <div class="form-group">
                <label for="login_id">Username or Email</label>
                <input type="text" id="login_id" name="login_id" class="form-control"
                       value="{{ login_id|default('') }}" placeholder="Enter username or email" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="font-weight: 600; font-size: 1rem; padding: 0.75rem;">Sign In</button>
        </form>
        
        <div style="text-align: center; margin: 1.25rem 0;">
            <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link" style="font-size: 0.95rem; color: var(--accent-primary); text-decoration: none;">Forgot password?</a>
        </div>
        
        <div style="border-top: 1px solid var(--border); margin-top: 1.5rem; padding-top: 1.5rem; text-align: center;">
            <a href="{{ url_for('auth.register') }}" class="btn" style="background: transparent; border: 1px solid var(--accent-primary); color: var(--accent-primary); font-weight: 600; padding: 0.75rem 2rem; display: inline-block;">Create new account</a>
        </div>
    </div>
</div>
{% endblock %}
