{% extends "base.html" %}
{% block title %}Reset Password — OptimizePro{% endblock %}
{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>OptimizePro</h1>
        <p class="subtitle">Set a new password for <strong>{{ username }}</strong></p>
        <form method="POST" id="resetForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="At least 6 characters" required minlength="6" autofocus>
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="Repeat your new password" required>
            </div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}">Back to Sign in</a>
        </div>
    </div>
</div>

{% block scripts %}
<script>
const pwInput = document.getElementById('password');
const strengthEl = document.getElementById('passwordStrength');

pwInput.addEventListener('input', () => {
    const val = pwInput.value;
    let strength = 0;
    if (val.length >= 6) strength++;
    if (val.length >= 10) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
    const colors = ['', 'var(--color-danger)', 'var(--color-warning)', 'var(--color-info)', 'var(--color-success)', 'var(--color-success)'];

    if (val.length === 0) {
        strengthEl.textContent = '';
        strengthEl.style.background = 'transparent';
    } else {
        strengthEl.textContent = labels[strength] || 'Weak';
        strengthEl.style.color = colors[strength] || colors[1];
        strengthEl.style.display = 'block';
    }
});
</script>
{% endblock %}
{% endblock %}
