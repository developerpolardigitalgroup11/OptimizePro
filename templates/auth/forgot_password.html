{% extends "base.html" %}
{% block title %}Forgot Password — OptimizePro{% endblock %}
{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>OptimizePro</h1>
        <p class="subtitle">Verify your identity to reset your password</p>
        <form method="POST" id="forgotForm">
            <div class="form-group">
                <label for="login_id">Username or Email</label>
                <input type="text" id="login_id" name="login_id" class="form-control"
                       value="{{ login_id|default('') }}" placeholder="Enter your username or email" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary">Verify Account</button>
        </form>
        <div class="auth-footer">
            Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
